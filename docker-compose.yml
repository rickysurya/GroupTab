services:

  postgres:
    image: postgres:16
    container_name: chat-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: chat_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    build:
      context: .
      dockerfile: rabbitmq.Dockerfile
    container_name: chat-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
      - "61613:61613"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: chat-app
    ports:
      - "8080:8080"
    environment:
      DB_HOST: postgres
      DB_NAME: chat_db
      DB_USER: postgres
      DB_PASSWORD: password
      RABBITMQ_HOST: rabbitmq
      JWT_SECRET: A7d92F6b1E83C5A2D4B6F1E98C7A3D5B
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

volumes:
  postgres_data: