spring:
  application:
    name: GroupTab

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/${DB_NAME:chat_db}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:password}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: 5672
    username: guest
    password: guest

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui
    tags-sorter: alpha
    operations-sorter: alpha

stomp:
  port: 61613

jwt:
  secret: ${JWT_SECRET:your-256-bit-secret-key-change-this-in-production-minimum-32-chars}
  expiration-ms: 86400000 # 24 hours

server:
  port: 8080