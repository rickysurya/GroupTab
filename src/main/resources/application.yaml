spring:
  application:
    name: GroupTab

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/${DB_NAME:chat_db}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:password}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: 5672
    username: guest
    password: guest

rabbitmq:
  stomp:
    port: 61613

server:
  port: 8080