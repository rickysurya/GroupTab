<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GroupTab</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/main.css">
</head>
<body>

<!-- ── Auth Screen ───────────────────────────────────────────────── -->
<div class="auth-screen" id="auth-screen">
    <div class="auth-card">
        <div class="auth-brand">
            <h1>GroupTab</h1>
            <p>Sign in to continue</p>
        </div>

        <div class="auth-tabs">
            <button class="auth-tab active" onclick="switchAuthTab('login')">Sign in</button>
            <button class="auth-tab" onclick="switchAuthTab('register')">Register</button>
        </div>

        <div id="auth-error" class="auth-error hidden"></div>

        <div class="auth-form">
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="auth-username" placeholder="yourname" autocomplete="username" />
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="auth-password" placeholder="••••••••"
                       autocomplete="current-password"
                       onkeydown="if(event.key==='Enter') submitAuth()" />
            </div>
            <button class="btn-auth" id="auth-submit-btn" onclick="submitAuth()">Sign in</button>
        </div>
    </div>
</div>

<!-- ── Chat App ──────────────────────────────────────────────────── -->
<div class="app hidden" id="app">
    <aside class="sidebar">
        <div class="sidebar-profile">
            <div class="avatar" id="user-avatar">?</div>
            <div class="profile-info">
                <span id="display-username">...</span>
                <span class="status-dot">● online</span>
            </div>
            <button class="btn-logout" onclick="logout()" title="Sign out">↩</button>
        </div>

        <div class="sidebar-section">
            <div class="sidebar-section-header">
                <span>Channels</span>
                <div style="display:flex;gap:6px">
                    <button class="btn-icon" onclick="copyInvite()" title="Copy invite link">⛓</button>
                    <button class="btn-icon" onclick="toggleNewChannel()" title="New channel" id="new-channel-btn">+</button>
                </div>
            </div>

            <div class="new-channel-form hidden" id="new-channel-form">
                <input type="text" id="new-channel-input" placeholder="channel-name"
                       maxlength="50"
                       onkeydown="if(event.key==='Enter') confirmNewGroup(); if(event.key==='Escape') cancelNewGroup()" />
                <input type="text" id="new-channel-currency" placeholder="currency e.g. IDR" maxlength="3"
                       onkeydown="if(event.key==='Enter') confirmNewGroup(); if(event.key==='Escape') cancelNewGroup()" />
                <div class="new-channel-actions">
                    <button class="btn-confirm" onclick="confirmNewGroup()">Create</button>
                    <button class="btn-cancel" onclick="cancelNewGroup()">Cancel</button>
                </div>
            </div>

            <ul id="group-list" class="channel-list"></ul>
        </div>
    </aside>

    <main class="chat">
        <header class="chat-header">
            <h2 id="chat-title">Select a channel</h2>
            <button class="btn-danger" onclick="showDeleteConfirm()">Delete</button>
        </header>

        <div class="delete-confirm hidden" id="delete-confirm">
            <span>⚠ Delete this channel? This cannot be undone.</span>
            <div class="delete-confirm-actions">
                <button class="btn-confirm-delete" onclick="confirmDelete()">Yes, delete</button>
                <button class="btn-cancel-delete" onclick="hideDeleteConfirm()">Cancel</button>
            </div>
        </div>

        <div id="messages" class="messages"></div>
        <div class="chat-input">
            <input type="text" id="message-input" placeholder="Type a message..."
                   autocomplete="off" onkeydown="if(event.key==='Enter') sendMessage()" />
            <button class="btn-primary" onclick="sendMessage()">Send</button>
        </div>
    </main>

    <!-- ── Expense Panel ─────────────────────────────────────────── -->
    <aside class="expense-panel" id="expense-panel">
        <div class="expense-panel-header">
            <span>Expenses</span>
            <button class="btn-icon" onclick="toggleAddExpense()" id="add-expense-btn" title="Add expense">+</button>
        </div>

        <!-- Add Expense Form -->
        <div class="add-expense-form hidden" id="add-expense-form">
            <div class="expense-form-group">
                <label>Title</label>
                <input type="text" id="expense-title" placeholder="e.g. Dinner" />
            </div>
            <div class="expense-form-group">
                <label>Split Type</label>
                <select id="expense-split-type" onchange="onSplitTypeChange()">
                    <option value="EQUAL">Equal</option>
                    <option value="CUSTOM">Custom</option>
                </select>
            </div>
            <div class="expense-form-group" id="expense-amount-group">
                <label>Total Amount</label>
                <input type="number" id="expense-amount" placeholder="0" min="0" />
            </div>
            <div class="expense-form-group">
                <label>Paid By</label>
                <select id="expense-paid-by"></select>
            </div>
            <div class="expense-form-group" id="expense-members-group">
                <label>Split Among</label>
                <div id="expense-members-list" class="members-checklist"></div>
            </div>
            <!-- Custom split entries -->
            <div class="expense-form-group hidden" id="custom-splits-group">
                <label>Custom Amounts</label>
                <div id="custom-splits-list"></div>
            </div>
            <div class="expense-form-actions">
                <button class="btn-confirm" onclick="submitExpense()">Add</button>
                <button class="btn-cancel" onclick="cancelAddExpense()">Cancel</button>
            </div>
        </div>

        <!-- Balances -->
        <div class="expense-section-header">
            <span>Balances</span>
            <button class="btn-icon" onclick="loadBalances()" title="Refresh">↻</button>
        </div>
        <div id="balances-list" class="balances-list">
            <div class="expense-empty">Select a channel</div>
        </div>

        <!-- Settlements -->
        <div class="expense-section-header">
            <span>Settle Up</span>
        </div>
        <div id="settlements-list" class="settlements-list"></div>

        <!-- Expense History -->
        <div class="expense-section-header">
            <span>History</span>
        </div>
        <div id="expense-history" class="expense-history"></div>
    </aside>
</div>

<!-- Toast notifications -->
<div class="toast-container" id="toast-container"></div>

<script src="https://cdn.jsdelivr.net/npm/@stomp/stompjs@7.0.0/bundles/stomp.umd.min.js"></script>
<script src="/app.js"></script>
</body>
</html>
