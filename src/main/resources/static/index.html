<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GroupTab</title>
    <link rel="stylesheet" href="main.css">
</head>
<body>
<div class="app">

    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="sidebar-profile">
            <div class="avatar" id="user-avatar">?</div>
            <div class="profile-info">
                <span id="display-username">Loading...</span>
                <span class="status-dot">● Online</span>
            </div>
        </div>

        <div class="sidebar-section">
            <div class="sidebar-section-header">
                <span>Channels</span>
                <button class="btn-icon" onclick="promptNewGroup()" title="New channel">+</button>
            </div>
            <ul id="group-list" class="channel-list"></ul>
        </div>
    </aside>

    <!-- Main Chat -->
    <main class="chat">
        <header class="chat-header">
            <h2 id="chat-title"># general</h2>
            <button class="btn-danger" onclick="deleteCurrentGroup()" id="delete-btn" title="Delete channel">Delete</button>
        </header>

        <div id="messages" class="messages"></div>

        <div class="chat-input">
            <input
                    type="text"
                    id="message-input"
                    placeholder="Message..."
                    autocomplete="off"
                    onkeydown="if(event.key==='Enter') sendMessage()"
            />
            <button class="btn-primary" onclick="sendMessage()">Send</button>
        </div>
    </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/@stomp/stompjs@7.0.0/bundles/stomp.umd.min.js"></script>
<script src="app.js"></script>
</body>
</html>
